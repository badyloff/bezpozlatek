---
layout: default
title: bezpozlátek
---

<div class="clanek" style="max-width:760px; margin-top:40px;">
  {% for post in site.posts %}
  <article style="margin-bottom:40px; padding-bottom:40px; border-bottom:1px solid #eee;">
    <a href="{{ post.url }}" style="text-decoration:none; color:#111;">
      <h2 style="font-size:1.4rem; margin-bottom:6px;">{{ post.title }}</h2>
    </a>
    <span class="datum">{{ post.date | date: "%d. %m. %Y" }}</span>
    <p>{{ post.excerpt }}</p>
  </article>
  {% endfor %}
</div>
