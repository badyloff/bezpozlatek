---
layout: default
title: Archiv
---

<main class="archiv">
  <h2>Archiv článků</h2>
  <ul class="archiv-seznam">
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}" class="archiv-link">
        {% if post.image %}
          <img src="{{ post.image }}" alt="{{ post.title }}">
        {% endif %}
        <div class="archiv-info">
          <span class="archiv-title">{{ post.title }}</span>
          <span class="archiv-datum">{{ post.date | date: "%m. %Y" }}</span>
        </div>
      </a>
    </li>
    {% endfor %}
  </ul>
</main>
