---
layout: default
title: Archiv
---

<main class="archiv">
  <h2>Archiv článků</h2>
  <ul class="archiv-seznam">
    {% for post in site.posts %}
    <li>
      {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}">
      {% endif %}
      <div class="archiv-info">
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%B %Y" }}</span>
      </div>
    </li>
    {% endfor %}
  </ul>
</main>
